<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional SMM Panel</title>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #28a745;
            --dark-color: #1e1e24;
            --light-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .panel-container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
            padding: 30px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--dark-color);
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: 500;
            font-size: 14px;
        }

        select, input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .qr-section {
            text-align: center;
            background: #111111;
            border: 2px solid #5f259f;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .qr-section img {
            max-width: 190px;
            height: auto;
            border-radius: 6px;
            border: 3px solid #ffffff;
            margin-top: 10px;
        }

        .error-msg {
            color: #dc3545;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .btn-whatsapp {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            text-decoration: none;
        }

        .btn-whatsapp:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="panel-container">
    <h2>Social Media Panel</h2>
    
    <form id="smmForm" onsubmit="sendToWhatsApp(event)">
        
        <div class="form-group">
            <label for="service">Service Chunein:</label>
            <select id="service" required>
                <option value="" disabled selected>-- Select Service --</option>
                <option value="Instagram Followers">Instagram Followers</option>
                <option value="Instagram Views">Instagram Views</option>
                <option value="Instagram Likes">Instagram Likes</option>
                <option value="Instagram Comments">Instagram Comments</option>
            </select>
        </div>

        <div class="form-group">
            <label for="quantity">Quantity (Kitna chahiye):</label>
            <input type="number" id="quantity" min="1" placeholder="Ex: 1000" required>
        </div>

        <div class="form-group">
            <label for="profileLink">Instagram Profile/Post Link:</label>
            <input type="text" id="profileLink" placeholder="https://instagram.com/..." required>
        </div>

        <div class="form-group">
            <label for="amount">Amount (Minimum ₹5):</label>
            <input type="number" id="amount" placeholder="Enter amount" required oninput="validateAmount()">
            <div id="amountError" class="error-msg">Paisa add karne ke liye minimum ₹5 hona chahiye.</div>
        </div>

        <div class="qr-section">
            <div style="font-weight: bold; color: #9d4edd; font-size: 16px;">PhonePe - ACCEPTED HERE</div>
            <div style="font-size: 12px; color: #cccccc; margin-top: 2px;">Scan & Pay Using PhonePe App</div>
            
            <img id="qrCodeImage" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAlgAAAMgCAYAAAD9b8bHAAAABGdBTUEAALGPC/xhBQAAACBjSFJNAAB6JgAAgIQAAPoAAACA6AAAdTAAAOpgAAA6mAAAF3CculE8AAAAMklEQVR42u3BAQ0AAADCoPdPbQ8HFAYAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIDbAFrwAAG39FscAAAAAElFTkSuQmCC" alt="Payment QR Code">
            
            <div style="font-size: 14px; font-weight: bold; margin-top: 8px; color: #ffffff; letter-spacing: 1px;">ABU UMAR</div>
            <p style="font-size: 11px; color: #aaaaaa; margin-top: 10px; margin-bottom: 0;">Payment karne ke baad Transaction ID daal kar Order Complete karein.</p>
        </div>

        <div class="form-group">
            <label for="txnId">Transaction ID / UTR No:</label>
            <input type="text" id="txnId" placeholder="Enter Transaction ID" required>
        </div>

        <button type="submit" class="btn-whatsapp">
            Order Complete Karein (WhatsApp)
        </button>

    </form>
</div>

<script>
    function validateAmount() {
        const amountInput = document.getElementById('amount');
        const errorMsg = document.getElementById('amountError');
        
        if (amountInput.value !== "" && parseInt(amountInput.value) < 5) {
            errorMsg.style.display = 'block';
            return false;
        } else {
            errorMsg.style.display = 'none';
            return true;
        }
    }

    function sendToWhatsApp(event) {
        event.preventDefault();

        const service = document.getElementById('service').value;
        const quantity = document.getElementById('quantity').value;
        const profileLink = document.getElementById('profileLink').value;
        const amount = document.getElementById('amount').value;
        const txnId = document.getElementById('txnId').value;

        // Double check minimum amount condition before sending
        if (parseInt(amount) < 5) {
            alert("Minimum ₹5 ya usse zyada amount enter karein.");
            return;
        }

        // Aapka set kiya hua WhatsApp number
        const whatsappNumber = "918178085392"; 
        
        // Formatting message for professional look
        const message = `*New SMM Order Details*%0A%0A` +
                        `*Service:* ${service}%0A` +
                        `*Quantity:* ${quantity}%0A` +
                        `*Link:* ${profileLink}%0A` +
                        `*Amount Paid:* ₹${amount}%0A` +
                        `*Transaction ID:* ${txnId}`;

        const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${message}`;
        
        // Redirect to WhatsApp
        window.open(whatsappUrl, '_blank');
    }
</script>

</body>
</html>
